<svg xmlns="http://www.w3.org/2000/svg" width="760" height="380" viewBox="0 0 760 380">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
      .username-bot { fill: #57f287; font-size: 15px; font-weight: 600; }
      .timestamp { fill: #949ba4; font-size: 11px; }
      .body { fill: #dbdee1; font-size: 14.5px; }
      .thread-name { fill: #00a8fc; font-size: 13.5px; font-weight: 500; }
      .thread-meta { fill: #949ba4; font-size: 11.5px; }
    </style>
    <linearGradient id="header-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2d31"/>
      <stop offset="1" stop-color="#2e3035"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="760" height="380" rx="12" fill="#313338"/>

  <!-- Channel header -->
  <rect width="760" height="50" rx="12" fill="url(#header-grad)"/>
  <rect y="42" width="760" height="8" fill="url(#header-grad)"/>
  <line x1="0" y1="50" x2="760" y2="50" stroke="#1e1f22" stroke-width="1"/>
  <text x="48" y="32" fill="#f2f3f5" font-size="16" font-weight="700"># claude-sessions</text>
  <text x="18" y="33" fill="#80848e" font-size="20" font-weight="400">#</text>

  <!-- Session 1 -->
  <g transform="translate(20, 68)">
    <circle cx="20" cy="20" r="20" fill="#57f287"/>
    <text x="11" y="26" fill="#1e1f22" font-size="14" font-weight="800">HB</text>
    <text x="50" y="16" class="username-bot">Happy Bot</text>
    <rect x="138" y="5" width="32" height="17" rx="3" fill="#5865f2"/>
    <text x="142" y="17" fill="#fff" font-size="9" font-weight="700">BOT</text>
    <text x="178" y="16" class="timestamp">Today at 9:15 AM</text>
    <text x="50" y="38" class="body">Session started</text>

    <!-- Thread pill -->
    <rect x="50" y="48" width="360" height="36" rx="8" fill="#2b2d31"/>
    <text x="68" y="62" fill="#80848e" font-size="15">🧵</text>
    <text x="88" y="71" class="thread-name">happy-discord-bot @ macbook</text>
    <text x="312" y="71" class="thread-meta">3 messages ›</text>
  </g>

  <!-- Session 2 -->
  <g transform="translate(20, 168)">
    <circle cx="20" cy="20" r="20" fill="#57f287"/>
    <text x="11" y="26" fill="#1e1f22" font-size="14" font-weight="800">HB</text>
    <text x="50" y="16" class="username-bot">Happy Bot</text>
    <rect x="138" y="5" width="32" height="17" rx="3" fill="#5865f2"/>
    <text x="142" y="17" fill="#fff" font-size="9" font-weight="700">BOT</text>
    <text x="178" y="16" class="timestamp">Today at 9:20 AM</text>
    <text x="50" y="38" class="body">Session started</text>

    <rect x="50" y="48" width="360" height="36" rx="8" fill="#2b2d31"/>
    <text x="68" y="62" fill="#80848e" font-size="15">🧵</text>
    <text x="88" y="71" class="thread-name">my-api-server @ macbook</text>
    <text x="278" y="71" class="thread-meta">12 messages ›</text>
  </g>

  <!-- Session 3 (current) -->
  <g transform="translate(20, 268)">
    <!-- Subtle highlight for current session -->
    <rect x="-12" y="-8" width="732" height="100" rx="6" fill="#2e3035" opacity="0.5"/>

    <circle cx="20" cy="20" r="20" fill="#57f287"/>
    <text x="11" y="26" fill="#1e1f22" font-size="14" font-weight="800">HB</text>
    <text x="50" y="16" class="username-bot">Happy Bot</text>
    <rect x="138" y="5" width="32" height="17" rx="3" fill="#5865f2"/>
    <text x="142" y="17" fill="#fff" font-size="9" font-weight="700">BOT</text>
    <text x="178" y="16" class="timestamp">Today at 10:30 AM</text>
    <text x="50" y="38" class="body">Session started</text>

    <rect x="50" y="48" width="400" height="36" rx="8" fill="#2b2d31"/>
    <text x="68" y="62" fill="#80848e" font-size="15">🧵</text>
    <text x="88" y="71" class="thread-name">frontend-app @ workstation</text>
    <text x="290" y="71" class="thread-meta">5 messages ›</text>

    <!-- Current badge -->
    <rect x="372" y="56" width="62" height="22" rx="11" fill="#5865f2"/>
    <text x="384" y="71" fill="#fff" font-size="11" font-weight="600">current</text>
  </g>
</svg>
