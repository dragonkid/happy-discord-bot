<svg xmlns="http://www.w3.org/2000/svg" width="760" height="460" viewBox="0 0 760 460">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
      .username-user { fill: #f2f3f5; font-size: 15px; font-weight: 600; }
      .username-bot { fill: #57f287; font-size: 15px; font-weight: 600; }
      .timestamp { fill: #949ba4; font-size: 11px; }
      .body { fill: #dbdee1; font-size: 14.5px; }
      .muted { fill: #949ba4; font-size: 13px; }
    </style>
    <linearGradient id="header-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2d31"/>
      <stop offset="1" stop-color="#2e3035"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="760" height="460" rx="12" fill="#313338"/>

  <!-- Channel header -->
  <rect width="760" height="50" rx="12" fill="url(#header-grad)"/>
  <rect y="42" width="760" height="8" fill="url(#header-grad)"/>
  <line x1="0" y1="50" x2="760" y2="50" stroke="#1e1f22" stroke-width="1"/>
  <text x="48" y="32" fill="#f2f3f5" font-size="16" font-weight="700"># claude-sessions</text>
  <text x="18" y="33" fill="#80848e" font-size="20" font-weight="400">#</text>

  <!-- Step 1: User runs /new -->
  <g transform="translate(20, 68)">
    <circle cx="20" cy="20" r="20" fill="#5865f2"/>
    <text x="14" y="26" fill="#fff" font-size="15" font-weight="700">Y</text>
    <text x="50" y="16" class="username-user">You</text>
    <text x="80" y="16" class="timestamp">Today at 10:30 AM</text>
    <text x="50" y="38" class="body">used </text>
    <rect x="89" y="24" width="46" height="20" rx="4" fill="#3c4270"/>
    <text x="97" y="39" fill="#c9cdfb" font-size="13" font-weight="500">/new</text>
  </g>

  <!-- Step 2: Bot shows dropdown -->
  <g transform="translate(20, 134)">
    <circle cx="20" cy="20" r="20" fill="#57f287"/>
    <text x="11" y="26" fill="#1e1f22" font-size="14" font-weight="800">HB</text>
    <text x="50" y="16" class="username-bot">Happy Bot</text>
    <rect x="138" y="5" width="32" height="17" rx="3" fill="#5865f2"/>
    <text x="142" y="17" fill="#fff" font-size="9" font-weight="700">BOT</text>
    <text x="178" y="16" class="timestamp">Today at 10:30 AM</text>
    <text x="50" y="38" class="body">Select a directory for the new session:</text>

    <!-- Select menu -->
    <rect x="50" y="50" width="440" height="38" rx="6" fill="#1e1f22" stroke="#3f4147" stroke-width="1"/>
    <text x="66" y="74" fill="#949ba4" font-size="14">Choose a directory...</text>
    <text x="466" y="74" fill="#949ba4" font-size="12">▾</text>

    <!-- Dropdown options (expanded) -->
    <rect x="50" y="92" width="440" height="140" rx="6" fill="#1e1f22" stroke="#3f4147" stroke-width="1"/>

    <!-- Option 1 -->
    <rect x="54" y="96" width="432" height="32" rx="4" fill="#43444b"/>
    <text x="70" y="116" fill="#f2f3f5" font-size="14">~/Coding/my-api-server</text>
    <text x="316" y="116" fill="#949ba4" font-size="11">last active 2h ago</text>

    <!-- Option 2 -->
    <rect x="54" y="132" width="432" height="32" rx="4" fill="transparent"/>
    <text x="70" y="152" fill="#dbdee1" font-size="14">~/Coding/frontend-app</text>
    <text x="316" y="152" fill="#949ba4" font-size="11">last active 5h ago</text>

    <!-- Option 3 -->
    <rect x="54" y="168" width="432" height="32" rx="4" fill="transparent"/>
    <text x="70" y="188" fill="#dbdee1" font-size="14">~/Coding/happy-discord-bot</text>
    <text x="316" y="188" fill="#949ba4" font-size="11">last active 1d ago</text>

    <!-- Custom path option -->
    <rect x="54" y="204" width="432" height="24" rx="4" fill="transparent"/>
    <line x1="66" y1="204" x2="474" y2="204" stroke="#3f4147" stroke-width="0.5"/>
    <text x="70" y="222" fill="#00a8fc" font-size="13">📁 Custom path...</text>
  </g>

  <!-- Step 3: Session created -->
  <g transform="translate(20, 376)">
    <circle cx="20" cy="20" r="20" fill="#57f287"/>
    <text x="11" y="26" fill="#1e1f22" font-size="14" font-weight="800">HB</text>
    <text x="50" y="16" class="username-bot">Happy Bot</text>
    <rect x="138" y="5" width="32" height="17" rx="3" fill="#5865f2"/>
    <text x="142" y="17" fill="#fff" font-size="9" font-weight="700">BOT</text>
    <text x="178" y="16" class="timestamp">Today at 10:30 AM</text>
    <text x="50" y="38" fill="#57f287" font-size="14.5">✓</text>
    <text x="68" y="38" class="body">Session created → </text>
    <text x="212" y="38" fill="#00a8fc" font-size="14.5" font-weight="500">#my-api-server @ macbook</text>
  </g>
</svg>
