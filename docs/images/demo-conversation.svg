<svg xmlns="http://www.w3.org/2000/svg" width="760" height="580" viewBox="0 0 760 580">
  <defs>
    <style>
      text { font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
      .mono { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; }
      .username-user { fill: #f2f3f5; font-size: 15px; font-weight: 600; }
      .username-bot { fill: #57f287; font-size: 15px; font-weight: 600; }
      .timestamp { fill: #949ba4; font-size: 11px; }
      .body { fill: #dbdee1; font-size: 14.5px; line-height: 1.4; }
      .muted { fill: #949ba4; font-size: 13px; }
      .btn-text { fill: #fff; font-size: 12px; font-weight: 500; }
      .embed-title { fill: #f2f3f5; font-size: 14px; font-weight: 600; }
      .code-text { fill: #e0e0e0; font-size: 12.5px; }
    </style>
    <clipPath id="avatar-clip"><circle cx="20" cy="20" r="20"/></clipPath>
    <linearGradient id="header-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2d31"/>
      <stop offset="1" stop-color="#2e3035"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="760" height="580" rx="12" fill="#313338"/>

  <!-- Channel header -->
  <rect width="760" height="50" rx="12" fill="url(#header-grad)"/>
  <rect y="42" width="760" height="8" fill="url(#header-grad)"/>
  <line x1="0" y1="50" x2="760" y2="50" stroke="#1e1f22" stroke-width="1"/>
  <text x="48" y="32" fill="#f2f3f5" font-size="16" font-weight="700"># my-project @ macbook</text>
  <text x="18" y="33" fill="#80848e" font-size="20" font-weight="400">#</text>

  <!-- User message -->
  <g transform="translate(20, 68)">
    <circle cx="20" cy="20" r="20" fill="#5865f2"/>
    <text x="14" y="26" fill="#fff" font-size="15" font-weight="700">Y</text>
    <text x="50" y="16" class="username-user">You</text>
    <text x="80" y="16" class="timestamp">Today at 10:32 AM</text>
    <text x="50" y="36" class="body">Add a health check endpoint to the API</text>
    <!-- Thinking emoji reaction -->
    <rect x="50" y="44" width="40" height="26" rx="13" fill="#2b2d31" stroke="#3f4147" stroke-width="1"/>
    <text x="58" y="62" font-size="14">🤔</text>
    <text x="76" y="61" fill="#b5bac1" font-size="11">1</text>
  </g>

  <!-- Bot reply 1 -->
  <g transform="translate(20, 152)">
    <circle cx="20" cy="20" r="20" fill="#57f287"/>
    <text x="11" y="26" fill="#1e1f22" font-size="14" font-weight="800">HB</text>
    <text x="50" y="16" class="username-bot">Happy Bot</text>
    <!-- BOT badge -->
    <rect x="138" y="5" width="32" height="17" rx="3" fill="#5865f2"/>
    <text x="142" y="17" fill="#fff" font-size="9" font-weight="700">BOT</text>
    <text x="178" y="16" class="timestamp">Today at 10:32 AM</text>
    <text x="50" y="36" class="body">I'll add a /health endpoint. Let me create the route file first.</text>
  </g>

  <!-- Permission: Bash -->
  <g transform="translate(20, 218)">
    <circle cx="20" cy="20" r="20" fill="#57f287"/>
    <text x="11" y="26" fill="#1e1f22" font-size="14" font-weight="800">HB</text>
    <text x="50" y="16" class="username-bot">Happy Bot</text>
    <rect x="138" y="5" width="32" height="17" rx="3" fill="#5865f2"/>
    <text x="142" y="17" fill="#fff" font-size="9" font-weight="700">BOT</text>
    <text x="178" y="16" class="timestamp">Today at 10:32 AM</text>

    <!-- Embed -->
    <rect x="50" y="30" width="620" height="92" rx="6" fill="#2b2d31"/>
    <rect x="50" y="30" width="4" height="92" rx="2" fill="#5865f2"/>

    <!-- Tool icon + name -->
    <text x="66" y="52" fill="#fff" font-size="16">⚡</text>
    <text x="86" y="52" class="embed-title">Bash</text>

    <!-- Code block -->
    <rect x="66" y="60" width="590" height="28" rx="4" fill="#1e1f22"/>
    <text x="78" y="79" class="mono code-text">mkdir -p src/routes</text>

    <!-- Buttons -->
    <rect x="66" y="96" width="54" height="22" rx="4" fill="#5865f2"/>
    <text x="78" y="111" class="btn-text">Yes</text>

    <rect x="126" y="96" width="116" height="22" rx="4" fill="#4e5058"/>
    <text x="138" y="111" fill="#dbdee1" font-size="12">Allow All Edits</text>

    <rect x="248" y="96" width="100" height="22" rx="4" fill="#4e5058"/>
    <text x="260" y="111" fill="#dbdee1" font-size="12">For This Tool</text>

    <rect x="354" y="96" width="40" height="22" rx="4" fill="#da373c"/>
    <text x="364" y="111" class="btn-text">No</text>
  </g>

  <!-- Permission: Write -->
  <g transform="translate(20, 354)">
    <circle cx="20" cy="20" r="20" fill="#57f287"/>
    <text x="11" y="26" fill="#1e1f22" font-size="14" font-weight="800">HB</text>
    <text x="50" y="16" class="username-bot">Happy Bot</text>
    <rect x="138" y="5" width="32" height="17" rx="3" fill="#5865f2"/>
    <text x="142" y="17" fill="#fff" font-size="9" font-weight="700">BOT</text>
    <text x="178" y="16" class="timestamp">Today at 10:32 AM</text>

    <!-- Embed -->
    <rect x="50" y="30" width="620" height="92" rx="6" fill="#2b2d31"/>
    <rect x="50" y="30" width="4" height="92" rx="2" fill="#57f287"/>

    <text x="66" y="52" fill="#fff" font-size="16">📝</text>
    <text x="86" y="52" class="embed-title">Write</text>

    <rect x="66" y="60" width="590" height="28" rx="4" fill="#1e1f22"/>
    <text x="78" y="79" class="mono code-text">src/routes/health.ts  (new file, 15 lines)</text>

    <rect x="66" y="96" width="54" height="22" rx="4" fill="#5865f2"/>
    <text x="78" y="111" class="btn-text">Yes</text>
    <rect x="126" y="96" width="116" height="22" rx="4" fill="#4e5058"/>
    <text x="138" y="111" fill="#dbdee1" font-size="12">Allow All Edits</text>
    <rect x="248" y="96" width="100" height="22" rx="4" fill="#4e5058"/>
    <text x="260" y="111" fill="#dbdee1" font-size="12">For This Tool</text>
    <rect x="354" y="96" width="40" height="22" rx="4" fill="#da373c"/>
    <text x="364" y="111" class="btn-text">No</text>
  </g>

  <!-- Bot final reply -->
  <g transform="translate(20, 488)">
    <circle cx="20" cy="20" r="20" fill="#57f287"/>
    <text x="11" y="26" fill="#1e1f22" font-size="14" font-weight="800">HB</text>
    <text x="50" y="16" class="username-bot">Happy Bot</text>
    <rect x="138" y="5" width="32" height="17" rx="3" fill="#5865f2"/>
    <text x="142" y="17" fill="#fff" font-size="9" font-weight="700">BOT</text>
    <text x="178" y="16" class="timestamp">Today at 10:33 AM</text>
    <text x="50" y="38" class="body">Done! Added GET /health endpoint that returns</text>
    <rect x="50" y="46" width="195" height="26" rx="4" fill="#1e1f22"/>
    <text x="60" y="64" class="mono code-text">{ "status": "ok" }</text>
  </g>
</svg>
